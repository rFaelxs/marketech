<!-- @dsCard group="Type" -->
<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Type families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
  .block { border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 18px 20px; }
  .meta { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-caps); }
  .name { font-size: 24px; font-weight: 800; margin: 4px 0 10px; letter-spacing: -0.01em; }
  .glyphs { font-size: 32px; line-height: 1.1; letter-spacing: -0.01em; }
  .glyphs.mono { font-family: var(--font-mono); font-size: 22px; }
  .weights { margin-top: 12px; display: flex; flex-direction: column; gap: 2px; font-size: 13px; color: var(--fg-2); }
  .weights span { color: var(--fg-1); }
</style></head>
<body>
  <div class="block">
    <div class="meta">Display + UI</div>
    <div class="name">Manrope</div>
    <div class="glyphs">Aa Bb Cc 0123 áçãõ</div>
    <div class="weights">
      <div><span style="font-weight:400">Regular 400</span> · <span style="font-weight:500">Medium 500</span> · <span style="font-weight:600">SemiBold 600</span> · <span style="font-weight:700">Bold 700</span> · <span style="font-weight:800">ExtraBold 800</span></div>
    </div>
  </div>
  <div class="block">
    <div class="meta">Numerals + Code</div>
    <div class="name" style="font-family:var(--font-mono);font-size:22px;font-weight:500">JetBrains Mono</div>
    <div class="glyphs mono">R$ 12,90 · #MK-1042</div>
    <div class="weights">
      <div><span style="font-family:var(--font-mono);font-weight:400">Regular</span> · <span style="font-family:var(--font-mono);font-weight:500">Medium</span></div>
    </div>
  </div>
</body></html>
