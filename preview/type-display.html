<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Display scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 60px 1fr 90px; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: none; }
  .tag { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .spec { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); text-align: right; }
  .sample { color: var(--fg-1); letter-spacing: -0.01em; }
</style></head>
<body>
  <div class="row"><div class="tag">H1</div><div class="sample" style="font-size:36px;font-weight:700;line-height:1.1">Pedidos de hoje</div><div class="spec">36 / 700</div></div>
  <div class="row"><div class="tag">H2</div><div class="sample" style="font-size:30px;font-weight:700;line-height:1.15">Catálogo</div><div class="spec">30 / 700</div></div>
  <div class="row"><div class="tag">H3</div><div class="sample" style="font-size:24px;font-weight:600;line-height:1.2">Detalhe do produto</div><div class="spec">24 / 600</div></div>
  <div class="row"><div class="tag">H4</div><div class="sample" style="font-size:20px;font-weight:600;line-height:1.3">Endereço de entrega</div><div class="spec">20 / 600</div></div>
</body></html>
