<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 70px 1fr 60px; align-items: center; gap: 14px; padding: 6px 0; }
  .tag { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .px { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); text-align: right; }
  .bar { height: 14px; background: var(--primary-500); border-radius: 3px; }
</style></head>
<body>
  <div class="row"><div class="tag">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="tag">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="tag">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="tag">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="tag">space-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="tag">space-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="tag">space-7</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="tag">space-8</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="tag">space-10</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
</body></html>
