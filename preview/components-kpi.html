<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>KPI cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .kpi { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 16px 18px; }
  .label { font-size: 11px; font-weight: 600; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-caps); }
  .value { font-family: var(--font-mono); font-size: 32px; font-weight: 600; margin-top: 8px; letter-spacing: -0.02em; color: var(--fg-1); }
  .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-top: 6px; padding: 2px 6px; border-radius: var(--radius-sm); }
  .delta.up { background: var(--green-50); color: var(--green-700); }
  .delta.down { background: var(--red-50); color: var(--red-700); }
  .delta.flat { background: var(--surface-2); color: var(--fg-2); }
</style></head>
<body>
  <div class="row">
    <div class="kpi">
      <div class="label">Receita do mês</div>
      <div class="value">R$ 184.320</div>
      <div class="delta up">↑ 12,4% vs. mês anterior</div>
    </div>
    <div class="kpi">
      <div class="label">Pedidos ativos</div>
      <div class="value">47</div>
      <div class="delta down">↓ 3 vs. ontem</div>
    </div>
    <div class="kpi">
      <div class="label">Clientes ativos</div>
      <div class="value">1.284</div>
      <div class="delta flat">— estável</div>
    </div>
  </div>
</body></html>
