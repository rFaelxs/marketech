<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 56px; background: var(--primary-500); }
  .name { font-size: 12px; font-weight: 600; }
  .px { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="px">6 px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="px">10 px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">lg</div><div class="px">16 px</div></div>
    <div class="item"><div class="box" style="border-radius:22px"></div><div class="name">xl</div><div class="px">22 px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px;width:56px;height:56px"></div><div class="name">pill</div><div class="px">9999</div></div>
  </div>
</body></html>
