<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Body & mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: 80px 1fr 100px; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: none; }
  .tag { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .spec { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="tag">body-lg</div><div style="font-size:18px;line-height:1.5">Selecione a forma de entrega para continuar.</div><div class="spec">18 / 400</div></div>
  <div class="row"><div class="tag">body</div><div style="font-size:15px;line-height:1.5">Pão Francês 50g — 12 unidades em estoque na sua região.</div><div class="spec">15 / 400</div></div>
  <div class="row"><div class="tag">body-sm</div><div style="font-size:13px;line-height:1.5;color:var(--fg-2)">Cupom aplicado. Desconto de 10% no subtotal.</div><div class="spec">13 / 400</div></div>
  <div class="row"><div class="tag">caption</div><div style="font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600">Receita do mês</div><div class="spec">11 / 600</div></div>
  <div class="row"><div class="tag">price</div><div style="font-family:var(--font-mono);font-size:18px;font-weight:500;font-variant-numeric:tabular-nums">R$ 1.247,80</div><div class="spec">18 / 500 mono</div></div>
  <div class="row"><div class="tag">ean</div><div style="font-family:var(--font-mono);font-size:13px;color:var(--fg-2)">789 1000 100103</div><div class="spec">13 / 400 mono</div></div>
</body></html>
