<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Primary scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1 / 1.2; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .w { font-size: 10px; font-weight: 600; }
  .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.85; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .title { font-size: 14px; font-weight: 600; color: var(--fg-1); }
  .anchor { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="header">
    <div class="title">Primary — Marketech Blue</div>
    <div class="anchor">brand anchor: 500 · #2563EB</div>
  </div>
  <div class="scale">
    <div class="sw" style="background:#EFF4FF;color:#172554"><div class="w">50</div><div class="h">EFF4FF</div></div>
    <div class="sw" style="background:#DBE5FE;color:#172554"><div class="w">100</div><div class="h">DBE5FE</div></div>
    <div class="sw" style="background:#BFD0FD;color:#172554"><div class="w">200</div><div class="h">BFD0FD</div></div>
    <div class="sw" style="background:#93B0FB;color:#172554"><div class="w">300</div><div class="h">93B0FB</div></div>
    <div class="sw" style="background:#6088F7;color:#fff"><div class="w">400</div><div class="h">6088F7</div></div>
    <div class="sw" style="background:#2563EB;color:#fff;outline:2px solid #18181B;outline-offset:2px"><div class="w">500</div><div class="h">2563EB</div></div>
    <div class="sw" style="background:#1D4ED8;color:#fff"><div class="w">600</div><div class="h">1D4ED8</div></div>
    <div class="sw" style="background:#1E40AF;color:#fff"><div class="w">700</div><div class="h">1E40AF</div></div>
    <div class="sw" style="background:#1E3A8A;color:#fff"><div class="w">800</div><div class="h">1E3A8A</div></div>
    <div class="sw" style="background:#172554;color:#fff"><div class="w">900</div><div class="h">172554</div></div>
  </div>
</body></html>
