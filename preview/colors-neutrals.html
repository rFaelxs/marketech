<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1 / 1.3; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; border: 1px solid var(--border-1); }
  .w { font-size: 10px; font-weight: 600; }
  .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.7; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .title { font-size: 14px; font-weight: 600; }
  .meta { font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="header">
    <div class="title">Neutrals — Zinc</div>
    <div class="meta">surfaces · text · borders</div>
  </div>
  <div class="scale">
    <div class="sw" style="background:#FAFAFA;color:#27272A"><div class="w">50</div><div class="h">FAFAFA</div></div>
    <div class="sw" style="background:#F4F4F5;color:#27272A"><div class="w">100</div><div class="h">F4F4F5</div></div>
    <div class="sw" style="background:#E4E4E7;color:#27272A"><div class="w">200</div><div class="h">E4E4E7</div></div>
    <div class="sw" style="background:#D4D4D8;color:#27272A"><div class="w">300</div><div class="h">D4D4D8</div></div>
    <div class="sw" style="background:#A1A1AA;color:#fff"><div class="w">400</div><div class="h">A1A1AA</div></div>
    <div class="sw" style="background:#71717A;color:#fff"><div class="w">500</div><div class="h">71717A</div></div>
    <div class="sw" style="background:#52525B;color:#fff"><div class="w">600</div><div class="h">52525B</div></div>
    <div class="sw" style="background:#3F3F46;color:#fff"><div class="w">700</div><div class="h">3F3F46</div></div>
    <div class="sw" style="background:#27272A;color:#fff"><div class="w">800</div><div class="h">27272A</div></div>
    <div class="sw" style="background:#18181B;color:#fff"><div class="w">900</div><div class="h">18181B</div></div>
  </div>
</body></html>
