<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px 24px; background: var(--surface-1); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 110px; height: 70px; background: #fff; border-radius: var(--radius-md); border: 1px solid var(--border-1); }
  .name { font-size: 12px; font-weight: 600; }
  .use { font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:0 1px 2px rgb(0 0 0 / 0.04)"></div><div class="name">xs</div><div class="use">cards · inputs</div></div>
    <div class="item"><div class="box" style="box-shadow:0 1px 3px rgb(0 0 0 / 0.06), 0 1px 2px rgb(0 0 0 / 0.04)"></div><div class="name">sm</div><div class="use">card hover</div></div>
    <div class="item"><div class="box" style="box-shadow:0 6px 16px rgb(0 0 0 / 0.08)"></div><div class="name">md</div><div class="use">dropdowns · toast</div></div>
    <div class="item"><div class="box" style="box-shadow:0 16px 40px rgb(0 0 0 / 0.12)"></div><div class="name">lg</div><div class="use">modais · sheets</div></div>
  </div>
</body></html>
