<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketech — Mercado Online</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  /* ========================================================
   * Marketech — App styles (extends colors_and_type.css)
   * ====================================================== */

  body { color: var(--fg-1); }

  /* Buttons */
  .btn { height: 40px; padding: 0 16px; border-radius: var(--radius-md); font: 600 14px var(--font-sans); cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), transform 80ms var(--ease-out); white-space: nowrap; text-decoration: none; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--primary-500); color: #fff; }
  .btn-primary:hover { background: var(--primary-600); }
  .btn-secondary { background: #fff; color: var(--fg-1); border-color: var(--border-1); }
  .btn-secondary:hover { background: var(--surface-2); border-color: var(--border-2); }
  .btn-ghost { background: transparent; color: var(--fg-1); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-danger { background: var(--red-500); color: #fff; }
  .btn-danger:hover { background: var(--red-600); }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
  .btn-block { width: 100%; }

  /* Inputs */
  .input, .select, .textarea { height: 40px; padding: 0 12px; border: 1px solid var(--border-1); border-radius: var(--radius-md); font: 400 14px var(--font-sans); color: var(--fg-1); background: #fff; width: 100%; transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary-500); box-shadow: var(--shadow-focus); }
  .input::placeholder { color: var(--fg-3); }
  .textarea { padding: 10px 12px; min-height: 80px; height: auto; font-family: var(--font-sans); }
  .field-label { font-size: 12px; font-weight: 600; color: var(--fg-2); display: block; margin-bottom: 6px; }
  .field { margin-bottom: 14px; }
  .input-icon { position: relative; }
  .input-icon .input { padding-left: 38px; }
  .input-icon svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-3); }

  /* Card */
  .card { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); }

  /* Status badge */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; line-height: 1.2; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge-confirmado { background: var(--status-confirmado-bg); color: var(--status-confirmado-fg); }
  .badge-separando { background: var(--status-separando-bg); color: var(--status-separando-fg); }
  .badge-transporte { background: var(--status-transporte-bg); color: var(--status-transporte-fg); }
  .badge-entregue { background: var(--status-entregue-bg); color: var(--status-entregue-fg); }
  .badge-cancelado { background: var(--status-cancelado-bg); color: var(--status-cancelado-fg); }
  .badge-aguardando { background: var(--surface-2); color: var(--fg-2); }
  .badge-pronto { background: var(--green-50); color: var(--green-700); }

  /* ========================================================
   * Login screen
   * ====================================================== */
  .login-shell { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
  .login-hero { background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-700) 100%); color: #fff; padding: 48px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .login-hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 80% 20%, rgb(255 255 255 / 0.08), transparent 50%); pointer-events: none; }
  .login-hero h1 { color: #fff; font-size: 44px; font-weight: 800; max-width: 480px; letter-spacing: -0.02em; line-height: 1.05; }
  .login-hero p { color: rgb(255 255 255 / 0.85); font-size: 18px; margin-top: 16px; max-width: 460px; }
  .login-hero .points { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
  .login-hero .point { display: flex; align-items: center; gap: 12px; font-size: 15px; color: rgb(255 255 255 / 0.9); }
  .login-hero .point .pill { width: 28px; height: 28px; border-radius: 50%; background: rgb(255 255 255 / 0.15); display: grid; place-items: center; }
  .login-form-wrap { display: grid; place-items: center; padding: 48px 32px; background: #fff; }
  .login-form { width: 100%; max-width: 380px; }
  .login-form h2 { font-size: 26px; margin-bottom: 6px; }
  .login-form .sub { color: var(--fg-2); margin-bottom: 24px; }
  .login-form .hint { font-size: 12px; color: var(--fg-3); margin-top: 16px; padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-sm); }
  .login-form .hint code { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .login-form .links { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; }
  .login-form .err { font-size: 12px; color: var(--red-600); margin-top: 6px; }

  /* ========================================================
   * App shell (sidebar + topbar)
   * ====================================================== */
  .app-shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  .sidebar { background: #fff; border-right: 1px solid var(--border-1); display: flex; flex-direction: column; }
  .sidebar-brand { padding: 18px 18px 8px; }
  .sidebar-brand img { display: block; height: 32px; }
  .sidebar-section { padding: 8px 10px; }
  .sidebar-label { font-size: 10px; font-weight: 700; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-caps); padding: 12px 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--fg-2); cursor: pointer; transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out); }
  .nav-item:hover { background: var(--surface-2); color: var(--fg-1); }
  .nav-item.active { background: var(--primary-50); color: var(--primary-700); font-weight: 600; }
  .nav-item .count { margin-left: auto; background: var(--primary-500); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-pill); min-width: 20px; text-align: center; }
  .nav-item.active .count { background: var(--primary-600); }

  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { height: var(--topbar-h); background: #fff; border-bottom: 1px solid var(--border-1); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .role-switcher { position: relative; }
  .role-trigger { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border: 1px solid var(--border-1); border-radius: var(--radius-md); background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; }
  .role-trigger:hover { background: var(--surface-2); }
  .role-trigger .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--primary-500); color: #fff; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
  .role-menu { position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 4px; z-index: 20; }
  .role-menu-item { padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .role-menu-item:hover { background: var(--surface-2); }
  .role-menu-item.active { background: var(--primary-50); color: var(--primary-700); font-weight: 600; }
  .role-menu-divider { height: 1px; background: var(--border-1); margin: 4px 0; }

  .content { padding: 28px 32px; flex: 1; max-width: 1280px; width: 100%; }
  .page-head { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .page-head h1 { font-size: 28px; }
  .page-head .sub { color: var(--fg-2); margin-top: 4px; font-size: 14px; }

  /* ========================================================
   * Catalog
   * ====================================================== */
  .catalog-layout { display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
  .filters { display: flex; flex-direction: column; gap: 20px; }
  .filter-block { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 16px; }
  .filter-block h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--fg-2); }
  .category-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item { padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .cat-item:hover { background: var(--surface-2); }
  .cat-item.active { background: var(--primary-50); color: var(--primary-700); font-weight: 600; }
  .cat-item .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .price-range { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .price-range input { width: 80px; height: 32px; padding: 0 8px; border: 1px solid var(--border-1); border-radius: var(--radius-sm); font: var(--font-mono); font-size: 12px; }
  .catalog-toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .catalog-toolbar .input-icon { flex: 1; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

  /* Product card */
  .pcard { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); overflow: hidden; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); cursor: pointer; display: flex; flex-direction: column; }
  .pcard:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .pcard-img { aspect-ratio: 1; background: var(--surface-2); position: relative; overflow: hidden; }
  .pcard-img img { width: 100%; height: 100%; object-fit: cover; }
  .pcard-img .out { position: absolute; inset: 0; background: rgb(255 255 255 / 0.8); display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--red-700); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .pcard-body { padding: 12px 14px 14px; display: flex; flex-direction: column; flex: 1; }
  .pcard-category { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; }
  .pcard-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-top: 4px; min-height: 36px; }
  .pcard-price { font-family: var(--font-mono); font-size: 18px; font-weight: 600; margin-top: 10px; letter-spacing: -0.01em; }
  .pcard-stock { font-size: 11px; margin-top: 2px; color: var(--green-700); font-weight: 500; }
  .pcard-stock.low { color: var(--amber-700); }
  .pcard-stock.out { color: var(--red-700); }
  .pcard-add { margin-top: 12px; }

  /* ========================================================
   * Product detail
   * ====================================================== */
  .detail-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 32px; }
  .detail-img { aspect-ratio: 1; background: var(--surface-0); border: 1px solid var(--border-1); border-radius: var(--radius-lg); overflow: hidden; }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-info h2 { font-size: 30px; line-height: 1.1; margin-bottom: 4px; }
  .detail-info .cat { font-size: 12px; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-weight: 600; }
  .detail-price { font-family: var(--font-mono); font-size: 36px; font-weight: 700; margin: 16px 0 8px; letter-spacing: -0.02em; }
  .detail-info .desc { color: var(--fg-2); margin-bottom: 24px; font-size: 15px; line-height: 1.6; }
  .nutri { background: var(--surface-1); border-radius: var(--radius-md); padding: 16px 18px; border: 1px solid var(--border-1); margin-top: 20px; }
  .nutri h5 { font-size: 12px; text-transform: uppercase; color: var(--fg-2); letter-spacing: var(--tracking-wide); margin-bottom: 10px; }
  .nutri-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-size: 13px; }
  .nutri-grid .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border-1); }
  .nutri-grid .row:last-child, .nutri-grid .row:nth-last-child(2) { border-bottom: none; }
  .nutri-grid .row .v { font-family: var(--font-mono); }
  .qty-stepper { display: inline-flex; align-items: center; border: 1px solid var(--border-1); border-radius: var(--radius-md); overflow: hidden; }
  .qty-stepper button { width: 36px; height: 40px; background: #fff; border: 0; cursor: pointer; font-size: 16px; color: var(--fg-2); }
  .qty-stepper button:hover { background: var(--surface-2); }
  .qty-stepper input { width: 44px; height: 40px; border: 0; text-align: center; font: 600 14px var(--font-mono); }
  .qty-stepper input:focus { outline: none; }

  /* ========================================================
   * Cart
   * ====================================================== */
  .cart-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 24px; }
  .cart-list { display: flex; flex-direction: column; gap: 0; background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); }
  .cart-row { display: grid; grid-template-columns: 72px 1fr auto auto; gap: 16px; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-1); }
  .cart-row:last-child { border-bottom: none; }
  .cart-row .thumb { width: 72px; height: 72px; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface-2); }
  .cart-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cart-row .info .name { font-weight: 600; font-size: 14px; }
  .cart-row .info .price { font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); margin-top: 2px; }
  .cart-row .line-total { font-family: var(--font-mono); font-weight: 600; font-size: 16px; min-width: 90px; text-align: right; }
  .cart-row .remove { width: 36px; height: 36px; border: 0; background: transparent; cursor: pointer; color: var(--fg-3); border-radius: var(--radius-sm); display: grid; place-items: center; }
  .cart-row .remove:hover { background: var(--red-50); color: var(--red-600); }
  .cart-summary { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 20px; align-self: start; position: sticky; top: 88px; }
  .cart-summary h4 { font-size: 13px; text-transform: uppercase; color: var(--fg-2); letter-spacing: var(--tracking-wide); margin-bottom: 14px; }
  .sum-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
  .sum-row.total { font-size: 18px; font-weight: 700; border-top: 1px solid var(--border-1); margin-top: 6px; padding-top: 12px; }
  .sum-row .v { font-family: var(--font-mono); }
  .sum-row .v.discount { color: var(--green-700); }
  .coupon-row { display: flex; gap: 8px; margin: 16px 0; }
  .coupon-row .input { flex: 1; }
  .empty-state { padding: 60px 24px; text-align: center; color: var(--fg-2); }
  .empty-state svg { color: var(--fg-3); margin-bottom: 12px; }
  .empty-state h3 { margin-bottom: 6px; color: var(--fg-1); }

  /* ========================================================
   * Checkout
   * ====================================================== */
  .checkout-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 24px; }
  .checkout-section { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 20px 22px; margin-bottom: 16px; }
  .checkout-section h3 { font-size: 16px; margin-bottom: 4px; }
  .checkout-section .sub { color: var(--fg-3); font-size: 12px; margin-bottom: 14px; }
  .radio-card-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .radio-card { padding: 14px; border: 1.5px solid var(--border-1); border-radius: var(--radius-md); cursor: pointer; transition: border-color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out); }
  .radio-card:hover { border-color: var(--border-2); }
  .radio-card.selected { border-color: var(--primary-500); background: var(--primary-50); }
  .radio-card .title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .radio-card .desc { font-size: 12px; color: var(--fg-2); margin-top: 4px; }
  .pix-qr { display: flex; gap: 20px; align-items: center; padding: 16px; background: var(--surface-1); border-radius: var(--radius-md); margin-top: 12px; }
  .pix-qr-code { width: 140px; height: 140px; background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-sm); padding: 8px; }
  .pix-qr-code svg { width: 100%; height: 100%; }
  .pix-info .code { font-family: var(--font-mono); font-size: 12px; background: #fff; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-1); margin-top: 8px; display: inline-block; }

  /* Order confirmation */
  .confirm-card { max-width: 480px; margin: 60px auto; text-align: center; padding: 40px 32px; }
  .confirm-card .check { width: 64px; height: 64px; border-radius: 50%; background: var(--green-100); color: var(--green-700); display: grid; place-items: center; margin: 0 auto 18px; }
  .confirm-card h2 { font-size: 24px; margin-bottom: 6px; }

  /* ========================================================
   * Orders list (cliente)
   * ====================================================== */
  .order-list { display: flex; flex-direction: column; gap: 16px; }
  .order-card { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 18px 20px; }
  .order-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .order-id { font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); }
  .order-meta { font-size: 12px; color: var(--fg-3); margin-top: 4px; }
  .order-total { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .progress-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 10px 0 14px; }
  .progress-step { display: flex; flex-direction: column; gap: 6px; }
  .progress-step .bar { height: 4px; border-radius: 2px; background: var(--surface-2); }
  .progress-step.done .bar { background: var(--primary-500); }
  .progress-step.active .bar { background: var(--primary-500); }
  .progress-step.cancelled .bar { background: var(--red-500); }
  .progress-step .label { font-size: 11px; font-weight: 600; color: var(--fg-3); }
  .progress-step.done .label, .progress-step.active .label { color: var(--fg-1); }
  .progress-step.active .label { color: var(--primary-600); }
  .order-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border-1); }

  /* ========================================================
   * Operador — products table
   * ====================================================== */
  .data-table { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); overflow: hidden; }
  .data-table table { width: 100%; border-collapse: collapse; }
  .data-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--fg-2); text-transform: uppercase; letter-spacing: var(--tracking-wide); padding: 12px 16px; background: var(--surface-1); border-bottom: 1px solid var(--border-1); }
  .data-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border-1); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface-1); }
  .data-table .ean { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .data-table .price { font-family: var(--font-mono); font-weight: 600; }
  .data-table .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .data-table .actions .btn { height: 28px; padding: 0 10px; font-size: 12px; }
  .pill-status { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; }
  .pill-status.on { background: var(--green-50); color: var(--green-700); }
  .pill-status.off { background: var(--surface-2); color: var(--fg-2); }

  /* ========================================================
   * Operador — Kanban
   * ====================================================== */
  .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: start; }
  .kanban-col { background: var(--surface-1); border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 12px; }
  .kanban-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px; }
  .kanban-head .name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--fg-2); display: flex; align-items: center; gap: 8px; }
  .kanban-head .count { background: #fff; border: 1px solid var(--border-1); padding: 1px 8px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 700; font-family: var(--font-mono); }
  .kanban-card { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 10px; box-shadow: var(--shadow-xs); }
  .kanban-card.late { border-color: var(--red-500); background: var(--red-50); }
  .kanban-card.intervened { border-color: var(--green-500); background: var(--green-50); }
  .kanban-card.intervened .time { color: var(--green-600); font-weight: 700; }
  .kanban-card .row1 { display: flex; justify-content: space-between; align-items: baseline; }
  .kanban-card .id { font-family: var(--font-mono); font-size: 13px; font-weight: 700; }
  .kanban-card .time { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  .kanban-card.late .time { color: var(--red-600); font-weight: 700; }
  .kanban-card .customer { font-size: 13px; margin-top: 4px; }
  .kanban-card .items { font-size: 12px; color: var(--fg-2); margin-top: 2px; }
  .kanban-card .actions { display: flex; gap: 6px; margin-top: 10px; }
  .kanban-card .actions .btn { height: 28px; padding: 0 10px; font-size: 12px; flex: 1; }

  /* ========================================================
   * Admin — Dashboard
   * ====================================================== */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 18px 20px; }
  .kpi .label { font-size: 11px; font-weight: 700; color: var(--fg-3); text-transform: uppercase; letter-spacing: var(--tracking-caps); }
  .kpi .value { font-family: var(--font-mono); font-size: 32px; font-weight: 700; margin-top: 8px; letter-spacing: -0.02em; }
  .kpi .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-top: 8px; padding: 2px 8px; border-radius: var(--radius-sm); }
  .kpi .delta.up { background: var(--green-50); color: var(--green-700); }
  .kpi .delta.down { background: var(--red-50); color: var(--red-700); }

  .dash-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  .chart-card { background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 20px; }
  .chart-card h4 { font-size: 14px; margin-bottom: 16px; }
  .bar-chart { display: flex; align-items: end; gap: 8px; height: 200px; padding: 8px 0 0; border-bottom: 1px solid var(--border-1); }
  .bar-chart .bar { flex: 1; background: var(--primary-500); border-radius: 4px 4px 0 0; position: relative; transition: background var(--dur-fast) var(--ease-out); min-height: 4px; }
  .bar-chart .bar:hover { background: var(--primary-600); }
  .bar-chart .bar .v { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--fg-2); }
  .bar-labels { display: flex; gap: 8px; margin-top: 6px; }
  .bar-labels span { flex: 1; text-align: center; font-size: 10px; color: var(--fg-3); font-family: var(--font-mono); }
  .top-list { display: flex; flex-direction: column; gap: 8px; }
  .top-item { display: grid; grid-template-columns: 24px 40px 1fr auto; gap: 12px; align-items: center; padding: 8px 4px; border-radius: var(--radius-sm); }
  .top-item .rank { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--fg-3); }
  .top-item .thumb { width: 40px; height: 40px; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface-2); }
  .top-item .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .top-item .name { font-size: 13px; font-weight: 500; }
  .top-item .meta { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .top-item .qty { font-family: var(--font-mono); font-weight: 600; font-size: 14px; }

  /* ========================================================
   * Modal
   * ====================================================== */
  .modal-backdrop { position: fixed; inset: 0; background: rgb(24 24 27 / 0.5); display: grid; place-items: center; z-index: 100; padding: 24px; animation: fadeIn var(--dur-med) var(--ease-out); }
  .modal { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 460px; padding: 24px 28px; animation: slideUp var(--dur-med) var(--ease-out); }
  .modal h3 { margin-bottom: 6px; }
  .modal .sub { color: var(--fg-2); margin-bottom: 18px; font-size: 14px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ========================================================
   * Toast
   * ====================================================== */
  .toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 200; pointer-events: none; }
  .toast { pointer-events: auto; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #fff; border: 1px solid var(--border-1); border-radius: var(--radius-md); box-shadow: var(--shadow-md); font-size: 14px; min-width: 280px; max-width: 480px; animation: toastIn var(--dur-med) var(--ease-out); }
  .toast.exit { animation: toastOut var(--dur-med) var(--ease-out) forwards; }
  .toast .icon { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
  .toast.success .icon { background: var(--green-100); color: var(--green-700); }
  .toast.info .icon { background: var(--primary-50); color: var(--primary-700); }
  .toast.warn .icon { background: var(--amber-100); color: var(--amber-700); }
  .toast.error .icon { background: var(--red-100); color: var(--red-700); }
  .toast .msg { flex: 1; }
  .toast .undo { color: var(--primary-600); font-weight: 600; cursor: pointer; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 13px; }
  .toast .undo:hover { background: var(--surface-2); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(8px); } }

  /* ========================================================
   * Screen transition — keep subtle; full fade breaks screenshot capture
   * ====================================================== */
  .screen-mount { animation: screenIn var(--dur-med) var(--ease-out); }
  @keyframes screenIn { from { opacity: 0.85; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

  /* ========================================================
   * Responsive
   * ====================================================== */
  @media (max-width: 1024px) {
    .app-shell { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }
    .sidebar-brand img { content: url("assets/logo-mark.svg"); height: 32px; width: 32px; }
    .nav-item span.label-text { display: none; }
    .nav-item { justify-content: center; }
    .sidebar-label { display: none; }
    .catalog-layout { grid-template-columns: 200px 1fr; }
    .cart-layout, .checkout-layout, .detail-layout, .dash-grid { grid-template-columns: 1fr; }
    .login-shell { grid-template-columns: 1fr; }
    .login-hero { padding: 32px; }
    .login-hero h1 { font-size: 32px; }
  }
  @media (max-width: 768px) {
    .content { padding: 18px; }
    .catalog-layout { grid-template-columns: 1fr; }
    .kpi-grid, .kanban { grid-template-columns: 1fr; }
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .radio-card-group { grid-template-columns: 1fr; }
  }
</style>
</head>

  <div id="app"></div>
  <div id="modal-root"></div>
  <div class="toast-stack" id="toast-stack"></div>

  <script src="app-data.js"></script>
  <script src="app.js"></script>
</body>
